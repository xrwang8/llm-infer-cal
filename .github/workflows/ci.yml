name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Security: `${{ matrix.python-version }}` is a static value from strategy.matrix,
# not user-controlled input. No github.event.*, head_ref, etc. are referenced.

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff (lint + format check)
        run: |
          ruff check src tests
          ruff format --check src tests

      - name: Mypy (strict)
        run: mypy src

      - name: Pytest
        run: pytest -q
