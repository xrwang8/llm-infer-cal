site_name: llm-infer-cal
site_description: LLM inference hardware calculator — architecture-aware, engine-version-aware, honest-labeled.
site_url: https://xrwang8.github.io/llm-infer-cal/
repo_url: https://github.com/xrwang8/llm-infer-cal
repo_name: xrwang8/llm-infer-cal
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.expand
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

nav:
  - English:
      - Home: index.md
      - Quickstart: quickstart.md
      - Models: models/index.md
      - Architecture Guide: architecture-guide.md
      - Methodology: methodology.md
      - Contributing: contributing.md
  - 中文:
      - 首页: zh/index.md
      - 快速开始: zh/quickstart.md
      - 模型评估: zh/models/index.md
      - 架构指南: zh/architecture-guide.md
      - 方法论: zh/methodology.md
      - 参与贡献: zh/contributing.md
  - ADRs:
      - adr/001-modelscope-integration-strategy.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

# Model pages under models/ are auto-generated and only reachable through the
# index — don't warn about each one being absent from the top-level nav.
validation:
  nav:
    omitted_files: ignore
  links:
    not_found: warn

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/xrwang8/llm-infer-cal
